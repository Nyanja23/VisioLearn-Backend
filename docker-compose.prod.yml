version: '3.8'

services:
  # Production-like database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: visiolearn
      POSTGRES_PASSWORD: secure_password_change_this
      POSTGRES_DB: visiolearn
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visiolearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Production-like cache
  redis:
    image: redis:7
    volumes:
      - redis_prod_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://visiolearn:secure_password_change_this@postgres:5432/visiolearn
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-here
      ALGORITHM: HS256
      ENVIRONMENT: production
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Celery worker (for async tasks)
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://visiolearn:secure_password_change_this@postgres:5432/visiolearn
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-here
      ALGORITHM: HS256
      ENVIRONMENT: production
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

volumes:
  postgres_prod_data:
  redis_prod_data:
