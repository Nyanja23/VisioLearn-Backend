name: Lint & Code Quality

on:
  push:
    branches: [ dev, main ]
    paths:
      - 'app/**'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ dev, main ]
    paths:
      - 'app/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy bandit[toml]
    
    - name: Check formatting with Black
      run: black --check app/
      continue-on-error: true
    
    - name: Check import ordering with isort
      run: isort --check-only app/
      continue-on-error: true
    
    - name: Lint with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Type checking with mypy
      run: |
        mypy app/ --ignore-missing-imports --no-error-summary 2>/dev/null || true
      continue-on-error: true
    
    - name: Security check with Bandit
      run: bandit -r app/ -f json -o bandit-report.json || true
      continue-on-error: true
    
    - name: Upload Bandit report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json
        retention-days: 30

  formatting-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check for secrets
      run: |
        pip install detect-secrets
        # Check if any secrets are committed (baseline setup)
        detect-secrets scan --all-files app/ 2>/dev/null || true
      continue-on-error: true
