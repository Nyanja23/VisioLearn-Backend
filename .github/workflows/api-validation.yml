name: API Validation

on:
  push:
    branches: [ dev, main ]
    paths:
      - 'app/routers/**'
      - 'app/main.py'
      - '.github/workflows/api-validation.yml'
  pull_request:
    branches: [ dev, main ]
    paths:
      - 'app/routers/**'
      - 'app/main.py'

jobs:
  api-check:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: visiolearn_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate FastAPI app loads without errors
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/visiolearn_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        ALGORITHM: HS256
      run: |
        python -c "
        import sys
        try:
          from app.main import app
          print('✓ FastAPI application loaded successfully')
          # List all routes
          routes = []
          for route in app.routes:
            if hasattr(route, 'path'):
              routes.append(route.path)
          print(f'✓ Found {len(routes)} API routes')
          print('✓ OpenAPI schema generated successfully')
          sys.exit(0)
        except Exception as e:
          print(f'✗ Error loading FastAPI app: {e}')
          import traceback
          traceback.print_exc()
          sys.exit(1)
        "
    
    - name: Generate OpenAPI schema
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/visiolearn_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        ALGORITHM: HS256
      run: |
        python -c "
        import json
        from app.main import app
        
        openapi_schema = app.openapi()
        with open('openapi-schema.json', 'w') as f:
          json.dump(openapi_schema, f, indent=2)
        print('✓ OpenAPI schema saved to openapi-schema.json')
        "
    
    - name: Validate OpenAPI schema
      run: |
        pip install openapi-spec-validator
        openapi-spec-validator openapi-schema.json
        echo "✓ OpenAPI schema is valid"
    
    - name: Upload OpenAPI schema
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: openapi-schema
        path: openapi-schema.json
        retention-days: 30
