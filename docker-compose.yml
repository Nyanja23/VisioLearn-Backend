version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: visiolearn_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - visiolearn

  postgres:
    image: postgres:15
    container_name: visiolearn_postgres
    environment:
      POSTGRES_DB: visiolearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - visiolearn

volumes:
  redis_data:
  postgres_data:

networks:
  visiolearn:
    driver: bridge
